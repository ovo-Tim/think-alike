services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: think_alike
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d think_alike"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres-data:/var/lib/postgresql/data

    deploy:
      resources:
        limits:
          cpus: '1.0'
          ram: 1GB

  embeddings:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    command:
      - -m
      - /models/qwen3-embedding_4b.gguf
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --embeddings
      - --ctx-size
      - "8192"
      - --batch-size
      - "1024"
      - --ubatch-size
      - "512"
      - --no-webui
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ./models/qwen3-embedding_4b.gguf:/models/qwen3-embedding_4b.gguf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 30
    ports:
      - "8080:8080"
    deploy:
      resources:
        limits:
          cpus: '4.0'
          ram: 16GB
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  app:
    build:
      context: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@db:5432/think_alike
      OPENAI_API_KEY: dummy
      OPENAI_EMBEDDING_URL: http://embeddings:8080/v1/embeddings
      OPENAI_EMBEDDING_MODEL: Qwen/qwen3-embedding
    depends_on:
      db:
        condition: service_healthy
      embeddings:
        condition: service_healthy
    ports:
      - "3000:3000"

    deploy:
      resources:
        limits:
          cpus: '1.0'
          ram: 1GB

volumes:
  postgres-data:
